name: Lab 3 Pipeline

on:
  push:
    paths:
      - 'lab3/mongoapp/**'
  pull_request:
    paths:
      - 'lab3/mongoapp/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-lab3

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lab3/mongoapp/package-lock.json
      - name: Install dependencies
        run: |
          cd lab3/mongoapp
          npm install
          npm install -g htmlhint
      - name: Lint
        run: |
          cd lab3/mongoapp
          npm run lint

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./lab3/mongoapp
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  performance-tests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Services with Docker Compose
        run: |
          cd lab3/mongoapp
          docker compose up -d
          sleep 20
      - name: Run k6 Load Test
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/load_test.js
      - name: Run k6 Stress Test
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/stress_test.js
      - name: Run k6 CI Thresholds Test
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/ci_thresholds_test.js
      - name: Cleanup
        if: always()
        run: |
          cd lab3/mongoapp
          docker compose down
