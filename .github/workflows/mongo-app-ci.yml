name: Mongo App CI & Performance

on:
  push:
    paths:
      - 'lab3/mongoapp/**'
  pull_request:
    paths:
      - 'lab3/mongoapp/**'

jobs:
  mongo-app-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Services with Docker Compose
        run: |
          cd lab3/mongoapp
          docker compose up -d
          # Wait for mongo and app to be ready
          sleep 20

      - name: Run k6 Load Test
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/load_test.js

      - name: Run k6 Stress Test
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/stress_test.js

      - name: Run k6 CI Thresholds Test
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/ci_thresholds_test.js

      - name: Cleanup
        if: always()
        run: |
          cd lab3/mongoapp
          docker compose down
