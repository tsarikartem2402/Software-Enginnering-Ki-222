version: '3.8'
services:
  # 1. Сервіс де запускається Node.js
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGO_DB_HOSTNAME: mongo 
      MONGO_DB_PORT: 27017
      MONGO_DB: usersdb
    depends_on:
      - mongo
    restart: always

  # 2. Сервіс MongoDB
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017" 
    volumes:
      - mongo-data:/data/db
    restart: always

  # 3. Сервіс k6 для тестування
  k6:
    image: grafana/k6
    volumes:
      - ./k6:/scripts
    environment:
      - BASE_URL=http://app:3000
    depends_on:
      - app

volumes:
  mongo-data: